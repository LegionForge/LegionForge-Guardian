name: Publish to PyPI

# Triggered when a version tag (v*) is pushed.
# Uses OIDC Trusted Publishing — no API token required.
#
# Prerequisites (one-time setup):
#   1. Create a "pypi" environment in GitHub repo Settings → Environments
#   2. Add a Trusted Publisher on pypi.org/manage/account/publishing/:
#      - Owner: LegionForge
#      - Repo: guardian
#      - Workflow: publish.yml
#      - Environment: pypi
#
# To cut a release:
#   git tag v0.2.0 -m "Release v0.2.0"
#   git push origin v0.2.0

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Verify distribution
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
